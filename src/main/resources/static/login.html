<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Karim</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f; --surface: #161619; --border: #2a2a30;
    --accent: #c8a96e; --accent-dim: rgba(200,169,110,0.12);
    --text: #e8e6e0; --muted: #6b6b70;
    --error: #e06c6c; --success: #52b788; --success-dim: rgba(82,183,136,0.12);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    padding: 16px; overflow-x: hidden;
  }

  body::before, body::after {
    content: ''; position: fixed; border-radius: 50%;
    filter: blur(80px); pointer-events: none; z-index: 0;
  }
  body::before {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(200,169,110,0.08) 0%, transparent 70%);
    top: -100px; right: -100px; animation: drift 12s ease-in-out infinite alternate;
  }
  body::after {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(82,183,136,0.05) 0%, transparent 70%);
    bottom: -80px; left: -80px; animation: drift 15s ease-in-out infinite alternate-reverse;
  }
  @keyframes drift { from { transform: translate(0,0); } to { transform: translate(40px,30px); } }

  .card {
    position: relative; z-index: 1;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; width: 100%; max-width: 420px;
    padding: 48px 40px; animation: fadeUp 0.6s ease both;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5);
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }

  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 36px; }
  .logo-icon {
    width: 36px; height: 36px; background: var(--accent);
    border-radius: 10px; display: grid; place-items: center;
    font-size: 16px; flex-shrink: 0;
  }
  .logo-text { font-family: 'DM Serif Display', serif; font-size: 20px; letter-spacing: -0.5px; }

  h1 { font-family: 'DM Serif Display', serif; font-size: 28px; font-weight: 400; line-height: 1.2; margin-bottom: 6px; }
  h1 em { color: var(--accent); font-style: italic; }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; font-weight: 300; }

  .field { margin-bottom: 18px; }
  label { display: block; font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

  input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 13px 16px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    transition: border-color 0.2s, box-shadow 0.2s; outline: none; -webkit-appearance: none;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
  input::placeholder { color: var(--muted); }

  .password-wrapper { position: relative; }
  .password-wrapper input { padding-right: 48px; }
  .toggle-pw {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: var(--muted);
    padding: 6px; display: flex; align-items: center; transition: color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .toggle-pw:hover { color: var(--text); }

  .btn {
    width: 100%; padding: 14px; background: var(--accent); color: #0d0d0f;
    border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 500; cursor: pointer;
    transition: opacity 0.2s, transform 0.15s; margin-top: 8px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .btn .spinner {
    display: none; width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.3); border-top-color: #0d0d0f;
    border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto;
  }
  .btn.loading .btn-text { display: none; }
  .btn.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: rgba(224,108,108,0.1); border: 1px solid rgba(224,108,108,0.25);
    border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--error);
    margin-top: 16px; display: none;
  }
  .error-msg.show { display: block; }
  .success-msg {
    background: var(--success-dim); border: 1px solid rgba(82,183,136,0.25);
    border-radius: 8px; padding: 12px 14px; font-size: 13px; color: var(--success);
    margin-top: 16px; display: none; text-align: center; line-height: 1.6;
  }
  .success-msg.show { display: block; }

  .footer-links { margin-top: 24px; display: flex; flex-direction: column; gap: 10px; text-align: center; }
  .footer-links p { font-size: 13px; color: var(--muted); }
  .footer-links a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .footer-links a:hover { text-decoration: underline; }

  @media (max-width: 480px) {
    body { align-items: flex-start; padding-top: 32px; }
    .card { padding: 32px 20px; border-radius: 16px; }
    h1 { font-size: 24px; }
    .subtitle { margin-bottom: 24px; }
  }
  @media (max-width: 360px) {
    .card { padding: 24px 16px; }
    h1 { font-size: 22px; }
    input { font-size: 16px; }
  }
</style>
</head>
<body>
	<div class="card">
		<div class="logo">
			<div class="logo-icon">✦</div>
			<span class="logo-text">Karim</span>
		</div>

		<h1>
			Welcome <em>back</em>
		</h1>
		<p class="subtitle">Sign in to your account to continue</p>

		<div class="field">
			<label>Email</label> <input type="email" id="email"
				placeholder="Enter your email" autocomplete="email" />
		</div>

		<div class="field">
			<label>Password</label>
			<div class="password-wrapper">
				<input type="password" id="password"
					placeholder="Enter your password" autocomplete="current-password" />
				<button class="toggle-pw" type="button"
					onclick="togglePw('password',this)" aria-label="Toggle password">
					<svg width="18" height="18" viewBox="0 0 24 24" fill="none"
						stroke="currentColor" stroke-width="2" stroke-linecap="round"
						stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
						<circle cx="12" cy="12" r="3" />
        </svg>
				</button>
			</div>
		</div>

		<button class="btn" id="loginBtn" onclick="handleLogin()">
			<span class="btn-text">Sign In</span>
			<div class="spinner"></div>
		</button>

		<div class="error-msg" id="errorMsg"></div>
		<div class="success-msg" id="successMsg"></div>

		<div class="footer-links">
			<p>
				<a href="forgot-password.html">Forgot your password?</a>
			</p>
			<p>
				Don't have an account? <a href="register.html">Create one</a>
			</p>
		</div>
	</div>

	<script>
  function togglePw(id, btn) {
    const inp = document.getElementById(id);
    const hide = inp.type === 'password';
    inp.type = hide ? 'text' : 'password';
    btn.querySelector('svg').innerHTML = hide
      ? '<line x1="1" y1="1" x2="23" y2="23"/><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }

  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');

    const errorEl = document.getElementById('errorMsg');
    const successEl = document.getElementById('successMsg');

    errorEl.classList.remove('show');
    successEl.classList.remove('show');

    if (!email || !password) {
      return showError('Please fill in all fields.');
    }

    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      return showError('Please enter a valid email address.');
    }

    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const rawText = await res.text();

      if (!res.ok) {
        let msg = `Server returned ${res.status}`;
        try {
          const e = JSON.parse(rawText);
          msg = e.message || e.error || JSON.stringify(e);
        } catch {
          if (rawText) msg = rawText;
        }
        throw new Error(msg);
      }

      const result = JSON.parse(rawText);
      const data = result.data || {};

      // ✅ Store tokens
      if (data.accessToken) {
        localStorage.setItem('authToken', data.accessToken);
      }

      if (data.refreshToken) {
        localStorage.setItem('refreshToken', data.refreshToken);
      }

      // ✅ Store user info
      localStorage.setItem('userId', data.userId || '');
      localStorage.setItem('email', data.email || email);
      localStorage.setItem('role', data.role || '');

      const uname =
        data.username ||
        data.name ||
        email.split('@')[0];

      localStorage.setItem('username', uname);

      // ✅ Role-based redirect (NO JWT decoding)
      let redirectTo = 'products.html';
      const role = (data.role || '').toUpperCase();

      if (role === 'ADMIN') {
        redirectTo = 'admin.html';
      } else if (role === 'DELIVERY') {
        redirectTo = 'delivery-dashboard.html';
      }

      successEl.textContent = '✓ Login successful! Redirecting…';
      successEl.classList.add('show');

      setTimeout(() => {
        window.location.href = redirectTo;
      }, 1000);

    } catch (err) {
      showError(err.message || 'Login failed. Please try again.');
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body>
</html>
