<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — Karim</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f; --surface: #161619; --border: #2a2a30;
    --accent: #c8a96e; --accent-dim: rgba(200,169,110,0.12);
    --text: #e8e6e0; --muted: #6b6b70;
    --error: #e06c6c; --success: #52b788; --success-dim: rgba(82,183,136,0.12);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    padding: 16px; overflow-x: hidden;
  }

  body::before, body::after {
    content: ''; position: fixed; border-radius: 50%;
    filter: blur(80px); pointer-events: none; z-index: 0;
  }
  body::before {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(200,169,110,0.08) 0%, transparent 70%);
    top: -100px; right: -100px; animation: drift 12s ease-in-out infinite alternate;
  }
  body::after {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(82,183,136,0.05) 0%, transparent 70%);
    bottom: -80px; left: -80px; animation: drift 15s ease-in-out infinite alternate-reverse;
  }
  @keyframes drift { from { transform: translate(0,0); } to { transform: translate(40px,30px); } }

  .card {
    position: relative; z-index: 1;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; width: 100%; max-width: 420px;
    padding: 48px 40px; animation: fadeUp 0.6s ease both;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5);
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }

  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
  .logo-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 10px; display: grid; place-items: center; font-size: 16px; flex-shrink: 0; }
  .logo-text { font-family: 'DM Serif Display', serif; font-size: 20px; letter-spacing: -0.5px; }

  .icon-wrap {
    width: 52px; height: 52px;
    background: var(--accent-dim); border: 1px solid rgba(200,169,110,0.25);
    border-radius: 14px; display: grid; place-items: center; margin-bottom: 18px;
  }
  .icon-wrap svg { color: var(--accent); }

  h1 { font-family: 'DM Serif Display', serif; font-size: 26px; font-weight: 400; line-height: 1.2; margin-bottom: 6px; }
  h1 em { color: var(--accent); font-style: italic; }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 28px; font-weight: 300; line-height: 1.6; }

  /* Steps */
  .steps { display: flex; align-items: center; margin-bottom: 28px; }
  .step { display: flex; align-items: center; gap: 8px; }
  .step-num {
    width: 26px; height: 26px; border-radius: 50%;
    border: 1.5px solid var(--border); display: grid; place-items: center;
    font-size: 11px; font-weight: 500; color: var(--muted); flex-shrink: 0; transition: all 0.3s;
  }
  .step-num.active { border-color: var(--accent); background: var(--accent); color: #0d0d0f; }
  .step-num.done   { border-color: var(--success); background: var(--success); color: #0d0d0f; }
  .step-label { font-size: 12px; color: var(--muted); font-weight: 500; transition: color 0.3s; white-space: nowrap; }
  .step-label.active { color: var(--text); }
  .step-connector { height: 1px; background: var(--border); flex: 1; margin: 0 8px; transition: background 0.3s; }
  .step-connector.done { background: var(--success); }

  .field { margin-bottom: 18px; }
  label { display: block; font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

  input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 13px 16px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    transition: border-color 0.2s, box-shadow 0.2s; outline: none; -webkit-appearance: none;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
  input::placeholder { color: var(--muted); }

  .btn {
    width: 100%; padding: 14px; background: var(--accent); color: #0d0d0f;
    border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 500; cursor: pointer;
    transition: opacity 0.2s, transform 0.15s; margin-top: 8px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .btn .spinner {
    display: none; width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.3); border-top-color: #0d0d0f;
    border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto;
  }
  .btn.loading .btn-text { display: none; }
  .btn.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Secondary outlined button */
  .btn-outline {
    width: 100%; padding: 13px; background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: 10px; font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500; cursor: pointer;
    transition: border-color 0.2s, color 0.2s, transform 0.15s; margin-top: 10px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--text); transform: translateY(-1px); }
  .btn-outline:active { transform: translateY(0); }

  .error-msg {
    background: rgba(224,108,108,0.1); border: 1px solid rgba(224,108,108,0.25);
    border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--error);
    margin-top: 16px; display: none;
  }
  .error-msg.show { display: block; }

  /* Step panels */
  .step-panel { display: none; }
  .step-panel.active { display: block; animation: fadeIn 0.35s ease both; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  /* Sent screen */
  .sent-icon {
    width: 68px; height: 68px;
    background: var(--success-dim); border: 1px solid rgba(82,183,136,0.25);
    border-radius: 50%; display: grid; place-items: center;
    margin: 0 auto 18px; animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes pop { from { transform:scale(0.5); opacity:0; } to { transform:scale(1); opacity:1; } }
  .sent-icon svg { color: var(--success); }
  .sent-center { text-align: center; }
  .sent-title { font-family: 'DM Serif Display', serif; font-size: 22px; margin-bottom: 10px; }
  .sent-desc { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 6px; }
  .sent-email { color: var(--accent); font-weight: 500; word-break: break-all; display: block; margin: 4px 0 16px; }
  .sent-note { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 0; }

  /* Countdown timer pill */
  .countdown-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--accent-dim); border: 1px solid rgba(200,169,110,0.2);
    border-radius: 20px; padding: 5px 12px; margin-top: 14px;
    font-size: 12px; color: var(--accent); font-weight: 500;
  }
  .countdown-pill .dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
    animation: blink 1s ease-in-out infinite;
  }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
  .footer-link { text-align: center; font-size: 13px; color: var(--muted); }
  .footer-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .footer-link a:hover { text-decoration: underline; }

  @media (max-width: 480px) {
    body { align-items: flex-start; padding-top: 32px; }
    .card { padding: 32px 20px; border-radius: 16px; }
    h1 { font-size: 22px; }
    .subtitle { margin-bottom: 20px; }
    .step-label { font-size: 11px; }
  }
  @media (max-width: 360px) {
    .card { padding: 24px 16px; }
    h1 { font-size: 20px; }
    input { font-size: 16px; }
    .step-label { display: none; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">✦</div>
    <span class="logo-text">Karim</span>
  </div>

  <div class="icon-wrap">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>

  <h1>Reset your <em>password</em></h1>
  <p class="subtitle" id="pageSubtitle">Enter your registered email and we'll send a password reset OTP.</p>

  <!-- Steps -->
  <div class="steps">
    <div class="step">
      <div class="step-num active" id="stepNum1">1</div>
      <span class="step-label active" id="stepLabel1">Enter Email</span>
    </div>
    <div class="step-connector" id="connector1"></div>
    <div class="step">
      <div class="step-num" id="stepNum2">2</div>
      <span class="step-label" id="stepLabel2">OTP Sent</span>
    </div>
  </div>

  <!-- Step 1 -->
  <div class="step-panel active" id="panel1">
    <div class="field">
      <label>Registered Email</label>
      <input type="email" id="email" placeholder="Enter your registered email" autocomplete="email" />
    </div>
    <button class="btn" id="sendBtn" onclick="handleForgotPassword()">
      <span class="btn-text">Send Reset OTP</span>
      <div class="spinner"></div>
    </button>
    <div class="error-msg" id="errorMsg1"></div>
  </div>

  <!-- Step 2 — OTP sent confirmation -->
  <div class="step-panel" id="panel2">
    <div class="sent-center">
      <div class="sent-icon">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </div>
      <p class="sent-title">Check your inbox</p>
      <p class="sent-desc">We've sent a password reset OTP to</p>
      <span class="sent-email" id="sentEmailDisplay"></span>
      <p class="sent-note">Use the OTP to reset your password. It expires in 10 minutes.</p>
      <div class="countdown-pill">
        <span class="dot"></span>
        Redirecting in <span id="redirectCount">5</span>s
      </div>
    </div>
    <button class="btn" style="margin-top:20px;" onclick="goToResetPage()">
      <span class="btn-text">Enter OTP &amp; Reset Password →</span>
    </button>
    <button class="btn-outline" onclick="window.location.href='login.html'">← Back to Sign In</button>
  </div>

  <hr class="divider" />
  <p class="footer-link"><a href="login.html">← Back to Sign In</a></p>
</div>

<script>
  let redirectTimer = null;

  async function handleForgotPassword() {
    const email = document.getElementById('email').value.trim();
    const btn   = document.getElementById('sendBtn');
    document.getElementById('errorMsg1').classList.remove('show');

    if (!email) { showError('errorMsg1', 'Please enter your email address.'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('errorMsg1', 'Please enter a valid email address.'); return; }

    btn.classList.add('loading'); btn.disabled = true;
    try {
      const res = await fetch('/api/auth/forgot-password', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const rawText = await res.text();
      if (!res.ok) {
        let msg = `Server returned ${res.status}`;
        try { const e = JSON.parse(rawText); msg = e.message || e.error || JSON.stringify(e); } catch { if (rawText) msg = rawText; }
        throw new Error(msg);
      }
      goToStep2(email);
    } catch (err) {
      showError('errorMsg1', err.message || 'Failed to send OTP. Please try again.');
    } finally { btn.classList.remove('loading'); btn.disabled = false; }
  }

  function goToStep2(email) {
    // Update step indicators
    document.getElementById('stepNum1').className   = 'step-num done';
    document.getElementById('stepNum1').textContent = '✓';
    document.getElementById('stepLabel1').classList.remove('active');
    document.getElementById('connector1').classList.add('done');
    document.getElementById('stepNum2').classList.add('active');
    document.getElementById('stepLabel2').classList.add('active');

    // Update subtitle and email display
    document.getElementById('pageSubtitle').textContent = 'OTP sent! Click below to enter your OTP and set a new password.';
    document.getElementById('sentEmailDisplay').textContent = email;

    // Switch panels
    document.getElementById('panel1').classList.remove('active');
    document.getElementById('panel2').classList.add('active');

    // Auto-redirect countdown (5s)
    let count = 5;
    const el = document.getElementById('redirectCount');
    redirectTimer = setInterval(() => {
      count--;
      el.textContent = count;
      if (count <= 0) {
        clearInterval(redirectTimer);
        goToResetPage();
      }
    }, 1000);
  }

  function goToResetPage() {
    if (redirectTimer) clearInterval(redirectTimer);
    const email = document.getElementById('sentEmailDisplay').textContent;
    window.location.href = 'reset-password.html?email=' + encodeURIComponent(email);
  }

  function showError(id, msg) { const el = document.getElementById(id); el.textContent = msg; el.classList.add('show'); }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('panel1').classList.contains('active')) handleForgotPassword();
  });
</script>
</body>
</html>
