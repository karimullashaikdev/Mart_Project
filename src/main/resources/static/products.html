<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Products</title>

	<link
		href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap"
		rel="stylesheet" />
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
	<link rel="stylesheet" href="/css/products.css" />

	<style>
		/* ── Category banner — shown when a category filter is active ── */
		#categoryBanner {
			display: none;
			align-items: center;
			gap: 12px;
			margin: 0 auto 18px;
			max-width: 1200px;
			padding: 10px 16px;
			background: var(--bg, #f9f9f9);
			border: 1px solid var(--border, #e5e5e5);
			border-radius: 12px;
			font-family: 'DM Sans', sans-serif;
			position: relative;
		}

		.cat-banner-img {
			width: 40px;
			height: 40px;
			border-radius: 8px;
			flex-shrink: 0;
		}

		.cat-banner-info {
			display: flex;
			flex-direction: column;
			gap: 2px;
			flex: 1;
		}

		.cat-banner-name {
			font-size: 14px;
			font-weight: 600;
			color: var(--text, #1a1a1a);
		}

		.cat-banner-slug {
			font-size: 11px;
			color: var(--muted, #888);
		}

		.cat-banner-clear {
			background: none;
			border: none;
			cursor: pointer;
			font-size: 14px;
			color: var(--muted, #888);
			padding: 4px 8px;
			border-radius: 6px;
			transition: background 0.15s;
		}

		.cat-banner-clear:hover {
			background: var(--border, #e5e5e5);
		}

		/* ── Category pill inside the product detail modal ── */
		.pdm-category-pill {
			display: inline-block;
			font-size: 11px;
			font-weight: 600;
			letter-spacing: 0.05em;
			text-transform: uppercase;
			color: var(--accent, #2d6a4f);
			background: rgba(45, 106, 79, 0.08);
			border: 1px solid rgba(45, 106, 79, 0.2);
			padding: 3px 10px;
			border-radius: 999px;
			cursor: pointer;
			margin-bottom: 8px;
			transition: background 0.15s;
		}

		.pdm-category-pill:hover {
			background: rgba(45, 106, 79, 0.16);
		}
	</style>
</head>

<body>
	<nav>
		<div class="nav-logo">
			<span>✦</span> Karim
		</div>
		<div class="nav-right">
			<a class="orders-btn" href="my-orders.html">📋 My Orders</a>

			<button class="cart-btn" id="cartBtn" onclick="openCartModal()" style="display:none">
				🛒 View Cart <span class="cart-count" id="cartCount">0</span>
			</button>

			<button class="profile-avatar-btn" id="profileAvatarBtn" onclick="openDrawer()" title="My Account">
				<span id="profileAvatarInitials">👤</span>
			</button>

			<button class="logout-btn" onclick="logout()">Sign out</button>
		</div>
	</nav>

	<!-- ─────────────────────────────────────────
	     Profile drawer overlay + drawer
	     ───────────────────────────────────────── -->
	<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

	<div class="profile-drawer" id="profileDrawer">
		<div class="drawer-header">
			<span class="drawer-title">My Account</span>
			<button class="drawer-close" onclick="closeDrawer()">✕</button>
		</div>

		<div class="profile-hero">
			<div class="profile-big-avatar" id="bigAvatar">👤</div>
			<div class="profile-hero-info">
				<h3 id="heroName">Loading…</h3>
				<p id="heroEmail"></p>
			</div>
		</div>

		<div class="drawer-tabs">
			<button class="dtab active" onclick="switchTab('account', this)">Account</button>
			<button class="dtab" onclick="switchTab('profile', this)">Profile</button>
			<button class="dtab" onclick="switchTab('addresses', this)">Addresses</button>
		</div>

		<div class="drawer-body">
			<div class="tab-panel active" id="tab-account">
				<div class="section-label">Account Details</div>

				<div class="field-group">
					<label>Full Name</label>
					<input type="text" id="acc-name" placeholder="Your name" />
				</div>

				<div class="field-group">
					<label>Email</label>
					<div id="acc-email-display"
						style="padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:14px;color:var(--muted);font-family:'DM Sans',sans-serif;">
						—
					</div>
					<input type="hidden" id="acc-email" />
					<div style="font-size:11px;color:var(--muted);margin-top:5px;">Email cannot be changed</div>
				</div>

				<div class="field-group">
					<label>Phone</label>
					<input type="tel" id="acc-phone" placeholder="+91 XXXXX XXXXX" />
				</div>

				<div class="inline-msg" id="acc-msg"></div>
				<button class="dbtn dbtn-primary" id="acc-save-btn" onclick="saveAccount()">Save Changes</button>
			</div>

			<div class="tab-panel" id="tab-profile">
				<div class="section-label">Profile Info</div>

				<div class="avatar-upload-area">
					<div class="avatar-preview" id="prf-avatar-preview">👤</div>
					<div class="avatar-upload-controls">
						<label class="avatar-upload-label" id="avatarUploadLabel" for="avatarFileInput">
							<span id="avatarUploadIcon">📷</span>
							<span id="avatarUploadText">Upload Photo</span>
						</label>
						<input type="file" id="avatarFileInput" accept="image/*" />
						<div class="avatar-upload-hint">JPG, PNG or WEBP · Max 5MB</div>
					</div>
				</div>

				<input type="hidden" id="prf-avatar" />
				<input type="hidden" id="prf-avatar-publicId" />

				<div class="field-group">
					<label>Date of Birth</label>
					<input type="date" id="prf-dob" />
				</div>

				<div class="field-group">
					<label>Gender</label>
					<select id="prf-gender">
						<option value="">Select…</option>
						<option value="MALE">Male</option>
						<option value="FEMALE">Female</option>
						<option value="OTHER">Other</option>
					</select>
				</div>

				<div class="inline-msg" id="prf-msg"></div>
				<button class="dbtn dbtn-primary" id="prf-save-btn" onclick="saveProfile()">Save Profile</button>
			</div>

			<div class="tab-panel" id="tab-addresses">
				<div class="section-label">Saved Addresses</div>
				<div id="addressList"></div>
			</div>
		</div>

		<div class="drawer-footer">
			<button class="dbtn dbtn-danger" onclick="logout()" style="margin-top:0">Sign Out</button>
		</div>
	</div>

	<!-- ─────────────────────────────────────────
	     Product Detail Modal
	     GET /api/products/{productId}
	     GET /api/products/slug/{slug}
	     ───────────────────────────────────────── -->
	<div class="pdm-overlay" id="pdmOverlay" onclick="handlePdmOverlayClick(event)">
		<div class="pdm-modal" id="pdmModal">
			<!-- content injected by renderPdmProduct() / showPdmLoading() -->
		</div>
	</div>

	<!-- ─────────────────────────────────────────
	     Page content
	     ───────────────────────────────────────── -->
	<div class="hero">
		<div class="hero-label">Our Catalogue</div>
		<h1>Discover our <em>finest</em><br />products</h1>
		<p>Hand-picked selection just for you</p>
	</div>

	<div class="controls">
		<input class="search-box" type="text" placeholder="🔍 Search products..." oninput="onSearch()"
			id="searchInput" />

		<div id="filterControls" style="display:flex;gap:8px;flex-wrap:wrap">
			<button class="filter-btn active" onclick="setFilter('all', '', this)">All</button>
		</div>

		<select class="page-size-select" id="pageSizeSelect" onchange="onPageSizeChange()">
			<option value="10">10 / page</option>
			<option value="20" selected>20 / page</option>
			<option value="50">50 / page</option>
		</select>
	</div>

	<!--
	     ── Category banner ──────────────────────────────────────────────────
	     Shown when a category filter is active.
	     Populated by loadCategoryBanner() via GET /api/categories/{idOrSlug}
	     (returns CategoryResponseDto: id, name, slug, imageUrl, isActive, sortOrder, parentId)
	     ─────────────────────────────────────────────────────────────────── -->
	<div id="categoryBanner"></div>

	<div class="grid" id="productGrid"></div>

	<div class="pagination-wrapper" id="paginationWrapper" style="display:none">
		<div class="pagination-info" id="paginationInfo"></div>
		<div class="pagination-controls" id="paginationControls"></div>
	</div>

	<div class="toast" id="toast"></div>

	<script>
		// Close PDM only when clicking the dark overlay backdrop (not the modal itself)
		function handlePdmOverlayClick(e) {
			if (e.target === document.getElementById("pdmOverlay")) {
				closePdmModal();
			}
		}

		// Close on Escape key
		document.addEventListener("keydown", (e) => {
			if (e.key === "Escape") {
				closePdmModal();
				closeDrawer();
			}
		});
	</script>

	<script src="/js/products.js" defer></script>
</body>

</html>
